<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b5fff">
  <title>{% block title %}Kit Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar no-print">
    <a class="brand" href="{{ url_for('dashboard') }}">📦 Kit&nbsp;Tracker</a>
  </header>

  <nav class="mainnav no-print">
    <a href="{{ url_for('dashboard') }}" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
    <a href="{{ url_for('jobs_list') }}" {% if request.path.startswith('/jobs') %}class="active"{% endif %}>Jobs</a>
    <a href="{{ url_for('setup_pick') }}" {% if request.path == '/setup' %}class="active"{% endif %}>Setup</a>
    <a href="{{ url_for('collection_pick') }}" {% if request.path == '/collection' %}class="active"{% endif %}>Collect</a>
    <a href="{{ url_for('equipment_list') }}" {% if request.path.startswith('/equipment') %}class="active"{% endif %}>Inventory</a>
    <a href="{{ url_for('missing_report') }}" {% if request.path == '/missing' %}class="active"{% endif %}>Missing</a>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }} no-print">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script>
    // Timestamps are stored/rendered in UTC server-side; swap in local time.
    document.querySelectorAll(".localdt").forEach(function (el) {
      var d = new Date(el.dataset.utc);
      if (!isNaN(d)) {
        el.textContent = d.toLocaleString(undefined, {
          day: "2-digit", month: "short", year: "numeric",
          hour: "2-digit", minute: "2-digit"
        });
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
